name: Nightly Regression Suite

on:
  schedule:
    - cron: "0 2 * * *"  # 2:00 AM UTC every night
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
      browser:
        description: "Browser to test"
        required: true
        default: "chrome"
        type: choice
        options: [chrome, firefox, edge, all]

env:
  PYTHON_VERSION: "3.11"
  TARGET_ENV: ${{ github.event.inputs.environment || 'staging' }}

jobs:
  full-regression:
    name: Full Regression (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event.inputs.browser == 'all' && fromJSON('["chrome", "firefox"]') || fromJSON(format('["{0}"]', github.event.inputs.browser || 'chrome')) }}

    services:
      selenium-hub:
        image: selenium/hub:4.18.1
        ports:
          - 4444:4444
        options: >-
          --health-cmd "curl -f http://localhost:4444/wd/hub/status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

      chrome-node:
        image: selenium/node-chrome:4.18.1
        options: --shm-size=2gb
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
          SE_NODE_MAX_SESSIONS: 5

      firefox-node:
        image: selenium/node-firefox:4.18.1
        options: --shm-size=2gb
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
          SE_NODE_MAX_SESSIONS: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Wait for Selenium Grid
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:4444/wd/hub/status; do sleep 3; done'
          echo "Selenium Grid is ready"

      - name: Run full regression suite
        env:
          SELENIUM_HUB_URL: http://localhost:4444
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          pytest tests/ \
            --browser=${{ matrix.browser }} \
            --env=${{ env.TARGET_ENV }} \
            --headless \
            --timeout=120 \
            --reruns=2 \
            --reruns-delay=5 \
            --tb=short \
            --html=reports/regression-${{ matrix.browser }}-report.html \
            --self-contained-html \
            -n auto \
            -v

      - name: Upload regression report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report-${{ matrix.browser }}
          path: reports/regression-${{ matrix.browser }}-report.html
          retention-days: 30

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.environment != 'production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Locust
        run: pip install locust==2.24.0

      - name: Run performance tests
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          locust \
            -f tests/performance/locustfile.py \
            --host=${{ secrets.STAGING_BASE_URL }} \
            --headless \
            --users=50 \
            --spawn-rate=5 \
            --run-time=5m \
            --html=reports/performance-report.html \
            --csv=reports/performance

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: reports/
          retention-days: 30

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [full-regression, performance-tests]
    if: failure()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Nightly regression failed on *${{ env.TARGET_ENV }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Nightly Regression Failed*\n*Environment:* ${{ env.TARGET_ENV }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
