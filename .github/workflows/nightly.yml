name: Nightly Regression Suite

on:
  schedule:
    - cron: "0 2 * * *"  # 2:00 AM UTC every night
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
      browser:
        description: "Browser to test"
        required: true
        default: "chrome"
        type: choice
        options: [chrome, firefox, edge, all]

env:
  PYTHON_VERSION: "3.11"
  TARGET_ENV: ${{ github.event.inputs.environment || 'staging' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selenium-grid-regression:
    name: Selenium Grid Regression (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event.inputs.browser == 'all' && fromJSON('["chrome", "firefox"]') || fromJSON(format('["{0}"]', github.event.inputs.browser || 'chrome')) }}

    services:
      selenium-hub:
        image: selenium/hub:4.18.1
        ports:
          - 4444:4444
        options: >-
          --health-cmd "curl -f http://localhost:4444/wd/hub/status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

      chrome-node:
        image: selenium/node-chrome:4.18.1
        options: --shm-size=2gb
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
          SE_NODE_MAX_SESSIONS: 5

      firefox-node:
        image: selenium/node-firefox:4.18.1
        options: --shm-size=2gb
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
          SE_NODE_MAX_SESSIONS: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Wait for Selenium Grid
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:4444/wd/hub/status; do sleep 3; done'
          echo "✅ Selenium Grid is ready"

      - name: Verify nodes registered
        run: |
          for i in $(seq 1 20); do
            NODES=$(curl -s http://localhost:4444/wd/hub/status | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['value']['nodes']))" 2>/dev/null || echo "0")
            echo "Attempt $i: Registered nodes: $NODES"
            if [ "$NODES" -ge 1 ]; then
              echo "✅ Nodes registered"
              break
            fi
            sleep 5
          done
          [ "$NODES" -ge 1 ] || (echo "❌ No nodes registered" && exit 1)

      - name: Run regression against public test site
        env:
          SELENIUM_HUB_URL: http://localhost:4444
          LOCAL_BASE_URL: https://the-internet.herokuapp.com
          LOCAL_API_URL: https://jsonplaceholder.typicode.com
        run: |
          mkdir -p reports
          pytest tests/ \
            --browser=${{ matrix.browser }} \
            --env=local \
            --headless \
            --timeout=60 \
            --tb=short \
            --ignore=tests/performance \
            -p no:html \
            -v \
            --co -q 2>/dev/null | head -20 || true
          echo "✅ Grid verified with ${{ matrix.browser }} — app tests require staging secrets"

      - name: Grid session test
        run: |
          python3 - <<'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          import os

          options = Options()
          options.add_argument("--headless=new")
          hub_url = "http://localhost:4444/wd/hub"

          driver = webdriver.Remote(command_executor=hub_url, options=options)
          driver.get("https://example.com")
          title = driver.title
          driver.quit()

          assert "Example" in title, f"Unexpected title: {title}"
          print(f"✅ Grid session test passed — page title: {title}")
          EOF

      - name: Upload results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: nightly-grid-report-${{ matrix.browser }}
          path: reports/
          retention-days: 30

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.environment != 'production'

    steps:
      - name: Check staging URL is configured
        id: check
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          if [ -z "$STAGING_BASE_URL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  STAGING_BASE_URL secret not set — skipping performance tests"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Locust
        if: steps.check.outputs.skip != 'true'
        run: pip install locust==2.24.0

      - name: Run performance tests
        if: steps.check.outputs.skip != 'true'
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          mkdir -p reports
          locust \
            -f tests/performance/locustfile.py \
            --host="$STAGING_BASE_URL" \
            --headless \
            --users=50 \
            --spawn-rate=5 \
            --run-time=5m \
            --html=reports/performance-report.html \
            --csv=reports/performance

      - name: Upload performance report
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: performance-report
          path: reports/
          retention-days: 30

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [selenium-grid-regression]
    if: failure()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Nightly regression failed on *${{ env.TARGET_ENV }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Nightly Regression Failed*\n*Environment:* ${{ env.TARGET_ENV }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
