name: CI Pipeline

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff==0.3.4 mypy==1.9.0 types-requests==2.31.0.20240311

      - name: Lint Python code
        run: ruff check tests/

      - name: Type check Python code
        run: mypy tests/ --ignore-missing-imports

      - name: Validate Terraform formatting
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/

      - name: Validate Ansible playbooks
        run: |
          pip install ansible==9.3.0 ansible-lint==24.2.0
          ansible-lint ansible/playbooks/

  smoke-tests:
    name: Smoke Tests (Docker)
    runs-on: ubuntu-latest
    needs: lint-and-validate

    services:
      selenium-hub:
        image: selenium/hub:4.18.1
        ports:
          - 4444:4444
        options: >-
          --health-cmd "curl -f http://localhost:4444/wd/hub/status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      chrome-node:
        image: selenium/node-chrome:4.18.1
        options: >-
          --shm-size=2gb
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Wait for Selenium Grid
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:4444/wd/hub/status; do sleep 2; done'

      - name: Run smoke tests
        env:
          SELENIUM_HUB_URL: http://localhost:4444
          LOCAL_BASE_URL: http://localhost:8080
          LOCAL_API_URL: http://localhost:8080/api/v1
        run: |
          pytest tests/ -m "smoke" \
            --browser=chrome \
            --headless \
            --timeout=60 \
            --tb=short \
            --html=reports/smoke-report.html \
            --self-contained-html \
            -v

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report
          path: reports/smoke-report.html
          retention-days: 7

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init (staging)
        run: terraform init -backend=false
        working-directory: terraform/

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/

      - name: Run tfsec security scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test runner image
        uses: docker/build-push-action@v5
        with:
          context: docker/test-runner
          push: false
          tags: qa-test-runner:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
